{% extends "student_base.html" %}

{% block title %}
{{ settings.COURSE_NAME.value }} — Scoreboard
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">{{ settings.COURSE_NAME.value }} — Scoreboard</h3>
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Team</th>
                            <th>Badges</th>
                            <th class="text-right">Points</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-table-body">
                        <tr><td colspan="4" class="text-center">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script type="module" src="{{ url_for('static', filename='js/scoreboard/minimal.js') }}"></script>
{% endblock %}

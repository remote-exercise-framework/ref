[pytest]
testpaths = e2e unit integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    e2e: marks tests as end-to-end tests
    unit: marks tests as unit tests
    offline: marks tests that can run without REF
    needs_ref: marks tests that require REF to be running
addopts = -v --tb=short -n auto --dist loadfile --cov=helpers --cov-report=term-missing --cov-report=html:coverage_reports/htmlcov --cov-report=xml:coverage_reports/coverage.xml
filterwarnings =
    ignore::DeprecationWarning
timeout = 300

# Parallel execution with pytest-xdist (default: auto, capped at 32 workers)
# Override workers: pytest -n 8 (specific count) or pytest -n 0 (disable parallel)
# Each worker gets its own REF instance for E2E tests
# loadfile keeps all tests from the same file on one worker (preserves cross-class state)

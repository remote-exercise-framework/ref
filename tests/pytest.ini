[pytest]
testpaths = e2e unit integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    e2e: marks tests as end-to-end tests
    unit: marks tests as unit tests
    offline: marks tests that can run without REF
    needs_ref: marks tests that require REF to be running
addopts = -v --tb=short --cov=helpers --cov-report=term-missing --cov-report=html:coverage_reports/htmlcov --cov-report=xml:coverage_reports/coverage.xml
filterwarnings =
    ignore::DeprecationWarning
timeout = 300

# Parallel execution with pytest-xdist
# Run tests in parallel: pytest -n auto (auto-detect CPUs) or pytest -n 4
# For unit tests only: pytest unit/ -n auto
# For E2E tests (each worker gets own REF instance): pytest e2e/ -n 2
# Use --dist loadscope to group tests by module (shares session fixtures)
